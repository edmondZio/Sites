  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useEffect, useMemo, useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      BookOpen, PenTool, ListChecks, Trophy, Timer,
      CheckCircle, XCircle, RotateCcw, PlayCircle,
      BrainCircuit, GraduationCap, Lightbulb, Eye, EyeOff
    } from 'lucide-react';

    // =========================
    // OUTILS
    // =========================

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const choice = (arr) => arr[randInt(0, arr.length - 1)];
    const shuffle = (arr) => {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    };
    const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
    const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);

    const normalize = (s) =>
      String(s ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim();

    const simplifyFraction = (num, den = 1) => {
      if (den === 0) return { num: 0, den: 1 };
      if (num === 0) return { num: 0, den: 1 };
      if (den < 0) { num = -num; den = -den; }
      const g = gcd(Math.abs(num), Math.abs(den));
      return { num: num / g, den: den / g };
    };

    const fracValue = (f) => f.num / f.den;

    const fracToString = (f) => {
      const s = simplifyFraction(f.num, f.den);
      return s.den === 1 ? `${s.num}` : `${s.num}/${s.den}`;
    };

    const parseNumberOrFraction = (input) => {
      if (input === null || input === undefined) return NaN;
      const clean = String(input)
        .replace(/−/g, '-')
        .replace(/,/g, '.')
        .replace(/\s+/g, '');

      if (!clean) return NaN;

      if (clean.includes('/')) {
        const [a, b] = clean.split('/');
        const num = parseFloat(a);
        const den = parseFloat(b);
        if (!isFinite(num) || !isFinite(den) || den === 0) return NaN;
        return num / den;
      }
      return parseFloat(clean);
    };

    const formatEquation = (mFrac, p) => {
      const m = simplifyFraction(mFrac.num, mFrac.den);

      if (m.num === 0) return `y = ${p}`;

      let xPart = '';
      if (m.num === m.den) xPart = 'x';
      else if (m.num === -m.den) xPart = '-x';
      else xPart = `${fracToString(m)}x`;

      if (p === 0) return `y = ${xPart}`;
      if (p > 0) return `y = ${xPart} + ${p}`;
      return `y = ${xPart} - ${Math.abs(p)}`;
    };

    const parseEquation = (input) => {
      let s = String(input ?? '')
        .toLowerCase()
        .replace(/−/g, '-')
        .replace(/,/g, '.')
        .replace(/\s+/g, '');

      s = s.replace(/^f\(x\)=/, '').replace(/^y=/, '');

      if (!s) return null;

      if (!s.includes('x')) {
        const p = parseNumberOrFraction(s);
        return isNaN(p) ? null : { m: 0, p };
      }

      const i = s.indexOf('x');
      let mPart = s.slice(0, i);
      let pPart = s.slice(i + 1);

      let m = 0;
      if (mPart === '' || mPart === '+') m = 1;
      else if (mPart === '-') m = -1;
      else m = parseNumberOrFraction(mPart);

      let p = 0;
      if (pPart) p = parseNumberOrFraction(pPart);

      if (!isFinite(m) || !isFinite(p)) return null;
      return { m, p };
    };

    const equationsEqual = (u, c) => {
      const a = parseEquation(u);
      const b = parseEquation(c);
      if (!a || !b) return false;
      return Math.abs(a.m - b.m) < 1e-6 && Math.abs(a.p - b.p) < 1e-6;
    };

    const formatTime = (s) => {
      const mm = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    };

    const uniqueOptions = (correct, extras) => {
      const out = [correct];
      extras.forEach(x => {
        if (x !== undefined && x !== null && x !== '' && !out.includes(x)) out.push(x);
      });
      while (out.length < 4) {
        const filler = `${randInt(-5, 5)}`;
        if (!out.includes(filler)) out.push(filler);
      }
      return shuffle(out.slice(0, 4));
    };

    const randomSlope = ({ allowZero = false, preferFraction = true } = {}) => {
      if (allowZero && Math.random() < 0.12) return { num: 0, den: 1 };
      const den = preferFraction ? choice([2, 2, 3, 3, 4, 5, 1]) : choice([1, 1, 1, 2, 2, 3]);
      let num = 0;
      while (num === 0) num = randInt(-5, 5);
      return simplifyFraction(num, den);
    };

    const makeGraphScenario = ({ preferFraction = true, allowZero = true } = {}) => {
      for (let t = 0; t < 300; t++) {
        const mFrac = randomSlope({ allowZero, preferFraction });
        const p = randInt(-5, 5);

        if (mFrac.num === 0) {
          if (Math.abs(p) > 8) continue;
          return {
            mFrac,
            p,
            points: [{ x: -4, y: p }, { x: 4, y: p }]
          };
        }

        const den = mFrac.den;
        const num = mFrac.num;
        const candidates = [];

        for (let x0 = -9; x0 <= 9 - den; x0++) {
          if (x0 % den !== 0) continue;
          const y0 = fracValue(mFrac) * x0 + p;
          const x1 = x0 + den;
          const y1 = y0 + num;

          if (
            Number.isInteger(y0) &&
            Number.isInteger(y1) &&
            Math.abs(y0) <= 9 &&
            Math.abs(y1) <= 9 &&
            Math.abs(x1) <= 9
          ) {
            candidates.push({ x0, y0, x1, y1 });
          }
        }

        if (candidates.length > 0) {
          const c = choice(candidates);
          return {
            mFrac,
            p,
            points: [{ x: c.x0, y: c.y0 }, { x: c.x1, y: c.y1 }]
          };
        }
      }

      return {
        mFrac: { num: 2, den: 3 },
        p: -1,
        points: [{ x: 0, y: -1 }, { x: 3, y: 1 }]
      };
    };

    const makeTwoPointScenario = ({ preferFraction = true, allowZero = true } = {}) => {
      for (let t = 0; t < 300; t++) {
        const mFrac = randomSlope({ allowZero, preferFraction });
        const p = randInt(-5, 5);
        const k = choice([1, 1, 2]);
        const dx = mFrac.den * k;
        const dy = mFrac.num * k;
        const x1 = mFrac.den * randInt(-4, 4);
        const y1 = fracValue(mFrac) * x1 + p;
        const x2 = x1 + dx;
        const y2 = y1 + dy;

        if (
          [x1, y1, x2, y2].every(v => Number.isInteger(v)) &&
          [x1, y1, x2, y2].every(v => Math.abs(v) <= 9) &&
          x1 !== x2
        ) {
          return {
            mFrac,
            p,
            A: { x: x1, y: y1 },
            B: { x: x2, y: y2 }
          };
        }
      }

      return {
        mFrac: { num: -3, den: 2 },
        p: 4,
        A: { x: -2, y: 7 },
        B: { x: 0, y: 4 }
      };
    };

    const makeParallelScenario = () => {
      for (let t = 0; t < 300; t++) {
        const mFrac = randomSlope({ allowZero: true, preferFraction: true });
        const den = mFrac.den;
        const x = den * randInt(-4, 4);
        const y = randInt(-8, 8);
        const pNew = y - fracValue(mFrac) * x;

        if (!Number.isInteger(pNew) || Math.abs(pNew) > 8) continue;

        let pOld = randInt(-8, 8);
        if (pOld === pNew) pOld += 1;
        if (Math.abs(pOld) > 8) continue;

        return {
          mFrac,
          oldEq: formatEquation(mFrac, pOld),
          point: { x, y },
          pNew
        };
      }

      return {
        mFrac: { num: 2, den: 3 },
        oldEq: 'y = 2/3x - 4',
        point: { x: 3, y: 5 },
        pNew: 3
      };
    };

    const slopeOptions = (mFrac) => {
      const correct = fracToString(mFrac);
      const wrongs = [];
      if (mFrac.num !== 0) wrongs.push(fracToString(simplifyFraction(mFrac.den, mFrac.num)));
      wrongs.push(fracToString({ num: -mFrac.num, den: mFrac.den }));
      if (mFrac.num !== 0) wrongs.push(fracToString(simplifyFraction(-mFrac.den, mFrac.num)));
      wrongs.push('0');
      return uniqueOptions(correct, wrongs);
    };

    const equationOptions = (mFrac, p) => {
      const correct = formatEquation(mFrac, p);
      const wrongs = [
        formatEquation({ num: -mFrac.num, den: mFrac.den }, p),
        formatEquation(mFrac, 0),
        formatEquation(mFrac, -p),
        formatEquation(mFrac, p + (p === 0 ? 2 : 1)),
      ];
      if (mFrac.num !== 0) wrongs.push(formatEquation(simplifyFraction(mFrac.den, mFrac.num), p));
      return uniqueOptions(correct, wrongs);
    };

    const checkAnswer = (question, userAnswer) => {
      if (question.kind === 'MCQ') return userAnswer === question.correctAnswer;

      if (question.answerType === 'FRACTION' || question.answerType === 'NUMBER') {
        const u = parseNumberOrFraction(userAnswer);
        const c = parseNumberOrFraction(question.correctAnswer);
        return isFinite(u) && isFinite(c) && Math.abs(u - c) < 1e-6;
      }

      if (question.answerType === 'EQUATION') {
        return equationsEqual(userAnswer, question.correctAnswer);
      }

      if (question.answerType === 'TEXT_SET') {
        const u = normalize(userAnswer);
        return (question.acceptedAnswers || []).some(a => normalize(a) === u);
      }

      return normalize(userAnswer) === normalize(question.correctAnswer);
    };

    // =========================
    // GÉNÉRATEURS DE QUESTIONS
    // =========================

    function genSlopeGraphMCQ() {
      const s = makeGraphScenario({ preferFraction: true, allowZero: true });
      const dx = s.points[1].x - s.points[0].x;
      const dy = s.points[1].y - s.points[0].y;

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Pente depuis un graphique',
        prompt: "À partir du graphique, quelle est la pente m de la droite ?",
        graph: s,
        options: slopeOptions(s.mFrac),
        correctAnswer: fracToString(s.mFrac),
        explanation: `On lit Δy = ${dy} et Δx = ${dx}, donc m = ${dy}/${dx} = ${fracToString(s.mFrac)}.`
      };
    }

    function genSlopeTwoPointsMCQ() {
      const s = makeTwoPointScenario({ preferFraction: true, allowZero: true });
      const dx = s.B.x - s.A.x;
      const dy = s.B.y - s.A.y;

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Pente depuis deux points',
        prompt: `La droite passe par A(${s.A.x}; ${s.A.y}) et B(${s.B.x}; ${s.B.y}). Quelle est sa pente ?`,
        options: slopeOptions(s.mFrac),
        correctAnswer: fracToString(s.mFrac),
        explanation: `m = (${s.B.y} - ${s.A.y}) / (${s.B.x} - ${s.A.x}) = ${dy}/${dx} = ${fracToString(s.mFrac)}.`
      };
    }

    function genEquationGraphMCQ() {
      const s = makeGraphScenario({ preferFraction: true, allowZero: true });

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Équation depuis un graphique',
        prompt: "Quelle est l'équation complète de la droite représentée ?",
        graph: s,
        options: equationOptions(s.mFrac, s.p),
        correctAnswer: formatEquation(s.mFrac, s.p),
        explanation: `La pente vaut ${fracToString(s.mFrac)} et l'ordonnée à l'origine vaut ${s.p}, donc l'équation est ${formatEquation(s.mFrac, s.p)}.`
      };
    }

    function genEquationTwoPointsMCQ() {
      const s = makeTwoPointScenario({ preferFraction: true, allowZero: true });

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Équation depuis deux points',
        prompt: `Détermine l'équation de la droite passant par A(${s.A.x}; ${s.A.y}) et B(${s.B.x}; ${s.B.y}).`,
        options: equationOptions(s.mFrac, s.p),
        correctAnswer: formatEquation(s.mFrac, s.p),
        explanation: `La pente vaut ${fracToString(s.mFrac)} puis, avec un des points, on trouve p = ${s.p}. L'équation est ${formatEquation(s.mFrac, s.p)}.`
      };
    }

    function genEquationParallelMCQ() {
      const s = makeParallelScenario();
      const correct = formatEquation(s.mFrac, s.pNew);

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Parallèle et point',
        prompt: `Quelle est l'équation de la droite passant par P(${s.point.x}; ${s.point.y}) et parallèle à ${s.oldEq} ?`,
        options: equationOptions(s.mFrac, s.pNew),
        correctAnswer: correct,
        explanation: `Deux droites parallèles ont la même pente ${fracToString(s.mFrac)}. En utilisant le point P, on obtient p = ${s.pNew}, donc ${correct}.`
      };
    }

    function genNatureMCQ() {
      const mode = choice(['linear', 'constant', 'relation']);

      if (mode === 'linear') {
        const a = randomSlope({ allowZero: false, preferFraction: true });
        const b = randInt(1, 5);
        const c = randInt(-5, -1);
        const d = randInt(1, 4);

        return {
          id: uid(),
          kind: 'MCQ',
          category: 'Affine, linéaire, constante',
          prompt: "Quelle fonction est linéaire ?",
          options: shuffle([
            `y = ${fracToString(a)}x`,
            `y = ${fracToString(a)}x + ${b}`,
            `y = ${c}`,
            `y = ${d} - x`
          ]),
          correctAnswer: `y = ${fracToString(a)}x`,
          explanation: "Une fonction linéaire est de la forme y = mx, donc son ordonnée à l'origine vaut 0."
        };
      }

      if (mode === 'constant') {
        const c = randInt(-6, 6) || 2;
        return {
          id: uid(),
          kind: 'MCQ',
          category: 'Affine, linéaire, constante',
          prompt: "Laquelle de ces fonctions est constante ?",
          options: shuffle([
            `y = ${c}`,
            `y = ${c}x`,
            `y = x + ${c}`,
            `y = -x + ${Math.abs(c) + 1}`
          ]),
          correctAnswer: `y = ${c}`,
          explanation: "Une fonction constante est de la forme y = p. Sa pente vaut 0."
        };
      }

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Affine, linéaire, constante',
        prompt: "Une fonction linéaire est toujours…",
        options: shuffle([
          "une fonction affine",
          "une fonction constante non nulle",
          "une fonction décroissante",
          "une fonction sans pente"
        ]),
        correctAnswer: "une fonction affine",
        explanation: "Une fonction linéaire est un cas particulier de fonction affine avec p = 0."
      };
    }

    function genVariationMCQ() {
      const mode = choice(['sign+', 'sign-', 'const', 'reverse']);

      if (mode === 'sign+') {
        return {
          id: uid(),
          kind: 'MCQ',
          category: 'Croissance et signe de la pente',
          prompt: "Si m > 0, la fonction affine est…",
          options: shuffle(["croissante", "décroissante", "constante", "impossible à savoir"]),
          correctAnswer: "croissante",
          explanation: "Une pente positive signifie que la droite monte quand x augmente."
        };
      }

      if (mode === 'sign-') {
        return {
          id: uid(),
          kind: 'MCQ',
          category: 'Croissance et signe de la pente',
          prompt: "Si une fonction affine est décroissante, alors…",
          options: shuffle(["m < 0", "m > 0", "m = 0", "p < 0"]),
          correctAnswer: "m < 0",
          explanation: "Une fonction affine décroissante a une pente négative."
        };
      }

      if (mode === 'const') {
        return {
          id: uid(),
          kind: 'MCQ',
          category: 'Croissance et signe de la pente',
          prompt: "Quelle pente correspond à une fonction constante ?",
          options: shuffle(["m = 0", "m = 1", "m > 0", "m < 0"]),
          correctAnswer: "m = 0",
          explanation: "Une fonction constante ne monte ni ne descend : sa pente est nulle."
        };
      }

      const mFrac = choice([
        { num: 2, den: 3 },
        { num: -3, den: 4 },
        { num: 0, den: 1 }
      ]);
      const p = randInt(-4, 4);
      const eq = formatEquation(mFrac, p);
      const expected = mFrac.num > 0 ? "croissante" : (mFrac.num < 0 ? "décroissante" : "constante");

      return {
        id: uid(),
        kind: 'MCQ',
        category: 'Croissance et signe de la pente',
        prompt: `La fonction ${eq} est…`,
        options: shuffle(["croissante", "décroissante", "constante", "ni l'une ni l'autre"]),
        correctAnswer: expected,
        explanation: `On lit le signe de la pente : m = ${fracToString(mFrac)}.`
      };
    }

    function genSlopeGraphOpen() {
      const s = makeGraphScenario({ preferFraction: true, allowZero: true });
      const dx = s.points[1].x - s.points[0].x;
      const dy = s.points[1].y - s.points[0].y;

      return {
        id: uid(),
        kind: 'OPEN',
        category: 'Pente depuis un graphique',
        prompt: "À partir du graphique, détermine la pente m de la droite.",
        graph: s,
        answerType: 'FRACTION',
        correctAnswer: fracToString(s.mFrac),
        explanation: `On lit Δy = ${dy} et Δx = ${dx}. Donc m = ${dy}/${dx} = ${fracToString(s.mFrac)}.`
      };
    }

    function genSlopeTwoPointsOpen() {
      const s = makeTwoPointScenario({ preferFraction: true, allowZero: true });
      const dx = s.B.x - s.A.x;
      const dy = s.B.y - s.A.y;

      return {
        id: uid(),
        kind: 'OPEN',
        category: 'Pente depuis deux points',
        prompt: `La droite passe par A(${s.A.x}; ${s.A.y}) et B(${s.B.x}; ${s.B.y}). Détermine la pente m.`,
        answerType: 'FRACTION',
        correctAnswer: fracToString(s.mFrac),
        explanation: `m = (${s.B.y} - ${s.A.y}) / (${s.B.x} - ${s.A.x}) = ${dy}/${dx} = ${fracToString(s.mFrac)}.`
      };
    }

    function genEquationGraphOpen() {
      const s = makeGraphScenario({ preferFraction: true, allowZero: true });

      return {
        id: uid(),
        kind: 'OPEN',
        category: 'Équation depuis un graphique',
        prompt: "Détermine l'équation complète y = mx + p de la droite représentée.",
        graph: s,
        answerType: 'EQUATION',
        correctAnswer: formatEquation(s.mFrac, s.p),
        explanation: `La pente vaut ${fracToString(s.mFrac)} et l'ordonnée à l'origine vaut ${s.p}. Donc ${formatEquation(s.mFrac, s.p)}.`
      };
    }

    function genEquationTwoPointsOpen() {
      const s = makeTwoPointScenario({ preferFraction: true, allowZero: true });

      return {
        id: uid(),
        kind: 'OPEN',
        category: 'Équation depuis deux points',
        prompt: `Détermine l'équation complète de la droite passant par A(${s.A.x}; ${s.A.y}) et B(${s.B.x}; ${s.B.y}).`,
        answerType: 'EQUATION',
        correctAnswer: formatEquation(s.mFrac, s.p),
        explanation: `La pente est ${fracToString(s.mFrac)} puis, avec un des points, on obtient p = ${s.p}. Donc ${formatEquation(s.mFrac, s.p)}.`
      };
    }

    function genEquationParallelOpen() {
      const s = makeParallelScenario();
      const eq = formatEquation(s.mFrac, s.pNew);

      return {
        id: uid(),
        kind: 'OPEN',
        category: 'Parallèle et point',
        prompt: `Détermine l'équation de la droite passant par P(${s.point.x}; ${s.point.y}) et parallèle à ${s.oldEq}.`,
        answerType: 'EQUATION',
        correctAnswer: eq,
        explanation: `Deux droites parallèles ont la même pente ${fracToString(s.mFrac)}. Ensuite ${s.point.y} = ${fracToString(s.mFrac)}·${s.point.x} + p, donc p = ${s.pNew}.`
      };
    }

    function genNatureOpen() {
      const type = choice(['affine', 'lineaire', 'constante']);

      if (type === 'affine') {
        const m = randomSlope({ allowZero: false, preferFraction: true });
        let p = 0;
        while (p === 0) p = randInt(-5, 5);

        return {
          id: uid(),
          kind: 'OPEN',
          category: 'Affine, linéaire, constante',
          prompt: `Donne le type de la fonction ${formatEquation(m, p)} : affine, linéaire ou constante.`,
          answerType: 'TEXT_SET',
          acceptedAnswers: ['affine'],
          correctAnswer: 'affine',
          explanation: "Comme la fonction est de la forme y = mx + p avec p ≠ 0, elle est affine."
        };
      }

      if (type === 'lineaire') {
        const m = randomSlope({ allowZero: false, preferFraction: true });

        return {
          id: uid(),
          kind: 'OPEN',
          category: 'Affine, linéaire, constante',

    const GraphSVG = ({ scenario, height = 360, showGuide = false }) => {
      const width = 480;
      const xMin = -10, xMax = 10, yMin = -10, yMax = 10;
      const m = fracValue(scenario.mFrac);
      const p = scenario.p;

      const toX = (x) => ((x - xMin) / (xMax - xMin)) * width;
      const toY = (y) => height - ((y - yMin) / (yMax - yMin)) * height;

      const linePoints = [
        { x: xMin, y: m * xMin + p },

            {Array.from({ length: 21 }, (_, k) => k - 10).map(v => (

    const LearningSection = () => {
      // =========================
// WIDGET VARIATION & PENTE
// =========================

const VariationWidget = () => {
  const [mVal, setMVal] = React.useState(1);
  const [pVal, setPVal] = React.useState(0);
  const canvasRef = React.useRef(null);

  const RANGE = 10, PAD = 44;

  const fmt = (n) => Number.isInteger(n) ? String(n) : n.toFixed(1);

  const buildFormula = (m, p) => {
    let s = 'f(x) = ';
    if (m === 0) return s + fmt(p);
    s += fmt(m) + 'x';
    if (p > 0) s += ' + ' + fmt(p);
    else if (p < 0) s += ' − ' + fmt(Math.abs(p));
    return s;
  };

  const zero = mVal !== 0 ? -pVal / mVal : null;

  const leftSign = mVal > 0 ? '−' : (mVal < 0 ? '+' : (pVal > 0 ? '+' : (pVal < 0 ? '−' : '0')));
  const rightSign = mVal > 0 ? '+' : (mVal < 0 ? '−' : (pVal > 0 ? '+' : (pVal < 0 ? '−' : '0')));

  const monotonyText = mVal > 0
    ? '↗ Fonction croissante (m > 0)'
    : mVal < 0
      ? '↘ Fonction décroissante (m < 0)'
      : '→ Fonction constante (m = 0)';

  const monotonyColor = mVal > 0 ? '#15803d' : mVal < 0 ? '#b91c1c' : '#92400e';
  const monotonyBg = mVal > 0 ? '#dcfce7' : mVal < 0 ? '#fee2e2' : '#fef9c3';
  const monotonyBorder = mVal > 0 ? '#86efac' : mVal < 0 ? '#fca5a5' : '#fde68a';

  const explainText = mVal === 0
    ? `Comme m = 0, la droite est horizontale (fonction constante). f(x) = ${fmt(pVal)} pour tout x.`
    : `Comme m = ${fmt(mVal)} ${mVal > 0 ? '> 0' : '< 0'}, la droite est ${mVal > 0 ? 'croissante' : 'décroissante'}. Le signe de f(x) s'annule en x = ${fmt(zero)} : ${mVal > 0 ? 'négatif à gauche, positif à droite' : 'positif à gauche, négatif à droite'}.`;

  const toCanvas = (x, y, W, H) => {
    const cx = PAD + (x + RANGE) / (2 * RANGE) * (W - 2 * PAD);
    const cy = (H - PAD) - (y + RANGE) / (2 * RANGE) * (H - 2 * PAD);
    return [cx, cy];
  };

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext('2d');
    const m = mVal, p = pVal;

    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = '#f8fafc';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(0, 0, W, H, 12);
    else ctx.rect(0, 0, W, H);
    ctx.fill();

    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    for (let i = -RANGE; i <= RANGE; i++) {
      const [gx] = toCanvas(i, 0, W, H);
      const [, gy] = toCanvas(0, i, W, H);
      ctx.beginPath(); ctx.moveTo(gx, PAD); ctx.lineTo(gx, H - PAD); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(PAD, gy); ctx.lineTo(W - PAD, gy); ctx.stroke();
    }

    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2;
    const [, ay] = toCanvas(0, 0, W, H);
    const [ax] = toCanvas(0, 0, W, H);
    ctx.beginPath(); ctx.moveTo(PAD, ay); ctx.lineTo(W - PAD, ay); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax, PAD); ctx.lineTo(ax, H - PAD); ctx.stroke();

    ctx.fillStyle = '#1e293b';
    ctx.beginPath(); ctx.moveTo(W - PAD + 8, ay); ctx.lineTo(W - PAD, ay - 5); ctx.lineTo(W - PAD, ay + 5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ax, PAD - 8); ctx.lineTo(ax - 5, PAD); ctx.lineTo(ax + 5, PAD); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#64748b';
    ctx.font = '11px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let i = -RANGE; i <= RANGE; i++) {
      if (i === 0) continue;
      const [gx] = toCanvas(i, 0, W, H);
      ctx.fillText(i, gx, ay + 6);
    }

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i = -RANGE; i <= RANGE; i++) {
      if (i === 0) continue;
      const [, gy] = toCanvas(0, i, W, H);
      ctx.fillText(i, ax - 6, gy);
    }

    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('0', ax - 4, ay + 4);

    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 13px Poppins, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('x', W - PAD + 12, ay);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('y', ax, PAD - 12);

    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    if (m === 0) {
      const [sx, sy] = toCanvas(-RANGE, p, W, H);
      const [ex, ey] = toCanvas(RANGE, p, W, H);
      ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    } else {
      const xAtYmax = (RANGE - p) / m;
      const xAtYmin = (-RANGE - p) / m;
      const xs = [-RANGE, RANGE, xAtYmax, xAtYmin].sort((a, b) => a - b);
      const x1c = Math.max(-RANGE, xs[1]);
      const x2c = Math.min(RANGE, xs[2]);
      const [sx, sy] = toCanvas(x1c, m * x1c + p, W, H);
      const [ex, ey] = toCanvas(x2c, m * x2c + p, W, H);
      ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    }
    ctx.stroke();

    if (m !== 0) {
      const z = -p / m;
      if (z >= -RANGE && z <= RANGE) {
        const [zx, zy] = toCanvas(z, 0, W, H);
        ctx.beginPath();
        ctx.arc(zx, zy, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#2563eb';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#1d4ed8';
        ctx.font = 'bold 11px Poppins, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(fmt(z), zx, zy - 10);
      }
    }

    ctx.fillStyle = '#2563eb';
    ctx.font = 'bold 13px Poppins, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(buildFormula(m, p), PAD + 4, PAD + 4);
  }, [mVal, pVal]);

  const sliderStyle = (val, min, max, color) => {
    const pct = ((val - min) / (max - min)) * 100;
    return {
      background: `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, #d1d5db ${pct}%, #d1d5db 100%)`
    };
  };

  return (
    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <h3 className="font-bold text-lg text-primary-dark mb-4">🎛️ Explorateur interactif</h3>

      <div style={{display:'flex', gap:'24px', flexWrap:'wrap'}}>
        <div style={{flex:'1 1 280px', minWidth:'240px'}}>
          <div style={{background:'#eff6ff', border:'2px solid #bfdbfe', borderRadius:'12px', padding:'12px 20px', textAlign:'center', marginBottom:'18px'}}>
            <span style={{fontSize:'1.4rem', fontWeight:700, color:'#1d4ed8', letterSpacing:'1px'}}>
              {buildFormula(mVal, pVal)}
            </span>
          </div>

          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:'6px', fontWeight:600}}>
              <span>Pente <em>m</em></span>
              <span style={{background:'#1d4ed8', color:'white', borderRadius:'6px', padding:'2px 10px', fontSize:'0.9rem'}}>{fmt(mVal)}</span>
            </div>
            <input
              type="range"
              min="-10"
              max="10"
              step="0.5"
              value={mVal}
              onChange={e => setMVal(parseFloat(e.target.value))}
              style={{...sliderStyle(mVal, -10, 10, '#16a34a'), width:'100%', height:'8px', borderRadius:'4px', outline:'none', cursor:'pointer', WebkitAppearance:'none', appearance:'none'}}
            />
          </div>

          <div style={{marginBottom:'18px'}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:'6px', fontWeight:600}}>
              <span>Ordonnée à l'origine <em>p</em></span>
              <span style={{background:'#ea580c', color:'white', borderRadius:'6px', padding:'2px 10px', fontSize:'0.9rem'}}>{fmt(pVal)}</span>
            </div>
            <input
              type="range"
              min="-10"
              max="10"
              step="0.5"
              value={pVal}
              onChange={e => setPVal(parseFloat(e.target.value))}
              style={{...sliderStyle(pVal, -10, 10, '#ea580c'), width:'100%', height:'8px', borderRadius:'4px', outline:'none', cursor:'pointer', WebkitAppearance:'none', appearance:'none'}}
            />
          </div>

          <div>
            <div style={{fontWeight:700, color:'#1e40af', marginBottom:'10px', fontSize:'0.95rem'}}>⊕ Tableau de Signes</div>
            <div style={{overflowX:'auto'}}>
              <table style={{borderCollapse:'collapse', width:'100%', minWidth:'300px', fontSize:'1rem'}}>
                <thead>
                  <tr style={{background:'#f1f5f9'}}>
                    <th style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', fontWeight:700, color:'#334155'}}>x</th>
                    <th style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', color:'#64748b', fontSize:'0.9rem'}}>−∞</th>
                    {mVal !== 0 && (
                      <th style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', fontWeight:800, color:'#1d4ed8', fontSize:'1.05rem'}}>
                        {fmt(zero)}
                      </th>
                    )}
                    <th style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', color:'#64748b', fontSize:'0.9rem'}}>+∞</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', textAlign:'center'}}><strong>f(x)</strong></td>
                    <td style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', textAlign:'center', ...(leftSign === '+' ? {color:'#16a34a', fontWeight:700, fontSize:'1.1rem'} : leftSign === '−' ? {color:'#dc2626', fontWeight:700, fontSize:'1.1rem'} : {})}}>
                      {leftSign}
                    </td>
                    {mVal !== 0 && (
                      <td style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', textAlign:'center', fontWeight:800, color:'#1d4ed8', fontSize:'1.05rem'}}>
                        0
                      </td>
                    )}
                    <td style={{border:'1.5px solid #cbd5e1', padding:'8px 14px', textAlign:'center', ...(rightSign === '+' ? {color:'#16a34a', fontWeight:700, fontSize:'1.1rem'} : rightSign === '−' ? {color:'#dc2626', fontWeight:700, fontSize:'1.1rem'} : {})}}>
                      {rightSign}
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div style={{display:'inline-flex', alignItems:'center', gap:'8px', marginTop:'12px', padding:'7px 16px', borderRadius:'999px', fontWeight:700, fontSize:'0.92rem', background:monotonyBg, color:monotonyColor, border:`1.5px solid ${monotonyBorder}`}}>
              {monotonyText}
            </div>

            <div style={{marginTop:'14px', padding:'12px 16px', borderRadius:'10px', fontSize:'0.9rem', lineHeight:'1.6', borderLeft:'4px solid #3b82f6', background:'#eff6ff', color:'#1e3a5f'}}>
              {explainText}
            </div>
          </div>
        </div>

        <div style={{flex:'2 1 340px', minWidth:'300px'}}>
          <canvas
            ref={canvasRef}

              </div>

              <div className="grid md:grid-cols-3 gap-4">
                <div className="rounded-2xl bg-slate-50 border border-slate-200 p-4">
                  <div className="text-sm text-slate-500">Élève</div>
                  <div className="text-lg font-bold text-slate-800">{studentName || '—'}</div>
                </div>
                <div className="rounded-2xl bg-slate-50 border border-slate-200 p-4">
                  <div className="text-sm text-slate-500">Score</div>
                  <div className="text-lg font-bold text-slate-800">{score} / {history.length || TOTAL}</div>
                </div>
                <div className="rounded-2xl bg-slate-50 border border-slate-200 p-4">
                  <div className="text-sm text-slate-500">Appréciation</div>
                  <div className="text-lg font-bold text-slate-800">{mention}</div>
                </div>
              </div>

              <div className="space-y-3 max-h-[460px] overflow-y-auto custom-scroll pr-1">
                {history.map((h, i) => (
                  <div key={i} className={`rounded-2xl border p-4 ${h.ok ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                    <div className="font-semibold text-slate-800">{i + 1}. {h.prompt}</div>
                    <div className="mt-2 text-sm text-slate-700">Type : {h.type === 'MCQ' ? 'QCM' : 'Réponse ouverte'}</div>
                    <div className="text-sm text-slate-700">Réponse donnée : {h.userAnswer}</div>
                    <div className="text-sm text-slate-700">Réponse attendue : {h.correct}</div>
                    <div className="mt-2 text-sm text-slate-700">{h.explanation}</div>
                  </div>
                ))}
              </div>

              <button
                onClick={restart}
                className="inline-flex items-center gap-2 bg-primary hover:bg-primary-dark text-white font-bold px-5 py-3 rounded-xl"
              >
                <RotateCcw size={18} />
                Refaire un test final
              </button>
            </div>
          )}
        </div>
      );
    };

    // =========================
    // APP PRINCIPALE
    // =========================

    const App = () => {
      const [section, setSection] = useState('learn');

      const tabs = [
        { id: 'learn', label: 'Apprendre', icon: <BookOpen size={18} /> },
        { id: 'practice', label: 'Exercices', icon: <PenTool size={18} /> },
        { id: 'mcq', label: 'QCM', icon: <ListChecks size={18} /> },
        { id: 'final', label: 'Test final', icon: <Trophy size={18} /> }
      ];

      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-20 backdrop-blur bg-white/90 border-b border-slate-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col gap-4">
              <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
                <div>
                  <h1 className="text-3xl font-serif font-bold text-primary-dark">🚀Fonctions affines : De zéro à héros🚀</h1>
                  <p className="text-slate-600 mt-1">
                    Apprendre, s'entraîner, réussir un QCM et terminer par un test complet.
                  </p>
                </div>
              </div>

              <div className="flex flex-wrap gap-2">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setSection(tab.id)}
                    className={`inline-flex items-center gap-2 px-4 py-2 rounded-full font-semibold border transition ${
                      section === tab.id
                        ? 'bg-primary text-white border-primary'
                        : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'
                    }`}
                  >
                    {tab.icon}
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            {section === 'learn' && <LearningSection />}
            {section === 'practice' && <PracticeSection />}
            {section === 'mcq' && <MCQSection />}
            {section === 'final' && <FinalTestSection />}
          </main>
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
